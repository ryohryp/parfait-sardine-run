name: Apply player sprite integration

on:
  push:
    branches:
      - agent/apply-chibi-player-sprites
    paths:
      - .github/workflows/apply-player-sprite.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/apply-chibi-player-sprites
          fetch-depth: 0

      - name: Apply sprite integration
        run: node scripts/apply-player-sprite.mjs

      - name: Commit generated source change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/ParfaitSardineRunPhase1.tsx
          git diff --cached --quiet && exit 0
          git commit -m "feat: render player with chibi sprite sheet"
          git push origin HEAD:agent/apply-chibi-player-sprites
