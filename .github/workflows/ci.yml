name: CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        id: build
        shell: bash
        run: |
          set +e
          npm run build > build.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Fail on build error
        if: steps.build.outputs.status != '0'
        run: |
          cat build.log
          exit 1

      - name: Test
        id: test
        if: steps.build.outputs.status == '0'
        shell: bash
        run: |
          set +e
          npm run test:run > test.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload CI diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-diagnostics
          path: |
            build.log
            test.log
          if-no-files-found: ignore

      - name: Fail on test error
        if: steps.test.outputs.status != '' && steps.test.outputs.status != '0'
        run: |
          cat test.log
          exit 1
